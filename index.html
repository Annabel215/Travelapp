<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214e43">
  <title>我们的欧洲之旅｜2026</title>
  <style>
:root{--ink:#23302d;--muted:#727d79;--cream:#f7f3eb;--paper:#fffefa;--green:#214e43;--sage:#dfeae4;--line:#e1e4dd;--coral:#dc775f}
*{box-sizing:border-box}body{margin:0;background:#dfe5df;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{width:min(100%,520px);min-height:100vh;margin:auto;background:var(--cream);padding-bottom:84px;box-shadow:0 0 60px #314d4422;font-size:16px}.app.large{font-size:19px}button,input{font:inherit}
header{height:74px;padding:0 20px;background:var(--paper);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px}.brand>b{width:40px;height:40px;border-radius:13px;background:var(--green);color:white;display:grid;place-items:center;font-family:serif;font-size:1.25em}.brand strong,.brand small{display:block}.brand strong{font-family:serif;font-size:1.05em}.brand small{font-size:.68em;color:var(--muted);margin-top:3px}header>button{height:41px;border:1px solid #c7d7d0;border-radius:12px;background:#eef4ef;color:var(--green);font-weight:800;padding:0 12px}
.hero{background:var(--green);color:#fff;padding:28px 22px 23px;position:relative;overflow:hidden}.hero>small,.list-head>small{font-size:.62em;letter-spacing:.16em;color:#bad0c6;font-weight:800}.hero h1{font:1.75em serif;margin:7px 0 6px;letter-spacing:.05em}.hero p{margin:0;color:#d2dfda;font-size:.8em}.flags{position:absolute;right:19px;top:38px;font-size:1.1em}.hero label{display:flex;justify-content:space-between;margin-top:24px;font-size:.7em;color:#c9d9d3}.hero label b{color:#fff}.hero>i{display:block;height:5px;background:#ffffff2e;border-radius:10px;margin-top:8px}.hero>i em{display:block;height:100%;background:#e6bd65;border-radius:10px;transition:.25s}
.dates{display:flex;overflow:auto;gap:6px;padding:12px;background:var(--paper);border-bottom:1px solid var(--line);scrollbar-width:none;position:sticky;top:0;z-index:3}.dates button{min-width:57px;border:0;background:transparent;color:var(--muted);border-radius:13px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:2px}.dates small{font-size:.67em}.dates b{font-size:.82em}.dates button.on{background:var(--green);color:#fff;box-shadow:0 5px 13px #214e4333}
.content{padding:23px 18px}.title{display:flex;justify-content:space-between}.title>div>span{display:inline-block;background:var(--sage);color:var(--green);font-size:.7em;font-weight:800;border-radius:12px;padding:5px 9px}.title h2,.list-head h2{font:1.75em serif;margin:9px 0 5px;letter-spacing:.03em}.title p,.list-head p{color:var(--muted);font-size:.78em;margin:0}.title mark{background:#e2eee5;color:#36705d;border-radius:8px;padding:3px 7px;font-weight:700}.title>b{display:flex;flex-direction:column;align-items:center;color:var(--green);font:2.45em serif}.title>b small{font:.24em sans-serif;letter-spacing:.2em}.quote{margin-top:22px;background:#f3e3bd;border:1px solid #e6d0a0;border-radius:17px;padding:15px;display:flex;align-items:center;gap:12px}.quote>span{width:42px;height:42px;background:#fff7e4;color:#b47719;border-radius:50%;display:grid;place-items:center;font-size:1.35em}.quote p,.facts p{margin:0}.quote small,.facts small{display:block;color:#806c47;font-size:.67em;margin-bottom:4px}.quote strong{font-family:serif;font-size:.95em}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0 25px}.facts>div{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:14px;display:flex;gap:8px;align-items:flex-start}.facts small{color:var(--muted)}.facts strong{font-size:.76em;line-height:1.45;display:block}.section-title{display:flex;align-items:end;justify-content:space-between;margin-bottom:12px}.section-title h3{font:1.2em serif;margin:0;border-left:4px solid var(--coral);padding-left:9px}.section-title small{font-size:.65em;color:var(--muted)}
.plans article{display:grid;grid-template-columns:18px 1fr;gap:9px;min-height:74px}.plans article>i{width:9px;height:9px;background:var(--coral);border-radius:50%;margin:20px auto;box-shadow:0 0 0 3px #f3d1c9;position:relative}.plans article:not(:last-child)>i:after{content:"";position:absolute;top:10px;left:4px;height:64px;border-left:1px solid #c7d2ce}.plans article>div{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px}.plans article small,.plans article strong{display:block}.plans article small{font-size:.64em;color:var(--green);margin-bottom:4px}.plans article strong{font-size:.84em;line-height:1.5}aside{background:#e1ede7;color:#315d52;padding:15px;border-radius:16px;margin-top:14px}aside strong{font:900 .88em serif}aside p{font-size:.73em;line-height:1.65;margin:5px 0 0}.switch{display:flex;gap:9px;margin-top:19px}.switch button{flex:1;height:44px;border:1px solid #b7c8c0;background:var(--paper);border-radius:12px;color:var(--green);font-weight:800}.switch button:disabled{opacity:.3}
.list-head{margin-bottom:17px}.list-head>small{color:#4c796d}.all{display:flex;flex-direction:column;gap:8px}.all button{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:11px 9px;display:grid;grid-template-columns:48px 25px 1fr auto 12px;gap:7px;align-items:center;text-align:left;color:var(--ink)}.all time{border-right:1px solid var(--line)}.all time small,.all time b{display:block;font-size:.66em}.all time b{font-size:.78em}.all p{min-width:0;margin:0}.all p strong,.all p small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.all p strong{font-size:.8em}.all p small{color:var(--muted);font-size:.63em;margin-top:3px}.all em{font-style:normal;font-size:.62em;background:#e0eee5;color:#34705c;padding:4px 6px;border-radius:7px}
.check{display:flex;flex-direction:column;gap:11px}.check article{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:15px}.check h3{font:1em serif;margin:0 0 9px}.check label{display:flex;align-items:center;gap:9px;border-top:1px solid #ededE7;padding:9px 0;font-size:.8em}.check input{width:21px;height:21px;accent-color:var(--green)}.check input:checked+span{text-decoration:line-through;color:var(--muted)}.emergency{margin-top:15px;background:#334f48;color:#fff;border-radius:17px;padding:17px;display:grid;grid-template-columns:1fr auto}.emergency a{grid-row:1/3;grid-column:2;color:#f3c96e;font-size:2em;font-weight:900;text-decoration:none}.emergency small{color:#cad9d3;margin-top:5px}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(100%,520px);height:74px;background:#fffefaf2;backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;z-index:5}.bottom button{min-width:90px;border:0;background:transparent;color:#83908b;font-size:1.35em;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px}.bottom span{font-size:.48em;margin-top:2px}.bottom button.on{color:var(--green);font-weight:900;background:#edf2ed}
@media(min-width:700px){.app{margin:24px auto;border-radius:28px;overflow:hidden;min-height:calc(100vh - 48px)}.bottom{bottom:24px;border-radius:0 0 28px 28px}}@media(max-width:370px){.flags{display:none}.facts{grid-template-columns:1fr}}
</style>
</head>
